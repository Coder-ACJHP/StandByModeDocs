<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Standby Clock App</title>
    <style>
        /* Modern, Clean & Responsive Theme Variables */
        :root {
            --bg-color: #f2f2f7;
            --text-color: #1c1c1e;
            --link-color: #007aff;
            --card-bg: #ffffff;
            --border-color: #e5e5ea;
        }

        /* Automatic Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #f2f2f7;
                --link-color: #0a84ff;
                --card-bg: #1c1c1e;
                --border-color: #38383a;
            }
        }

        /* Base Typography & Layout */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Content Container */
        .container {
            max-width: 560px;
            width: 100%;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        /* Typography Styles */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: var(--text-color);
            opacity: 0.85;
            margin-bottom: 32px;
        }

        /* Contact Section Highlight */
        .contact-box {
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .contact-box span {
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .email-link {
            font-size: 20px;
            font-weight: 600;
            color: var(--link-color);
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .email-link:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>App Support</h1>
        <p>If you experience any issues, have feature requests, or need assistance with the app, we are always here to help. Feel free to reach out directly.</p>
        
        <div class="contact-box">
            <span>Contact Us via Email</span>
            <a href="mailto:hexa.octabin@gmail.com" class="email-link">hexa.octabin@gmail.com</a>
        </div>
    </div>

</body>
</html>
